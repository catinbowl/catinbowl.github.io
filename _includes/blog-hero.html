<section class="blog-hero">
  <div class="blog-hero-label">
    <div class="title-line"></div>
    <span>LATEST THINKING</span>
  </div>
  <div class="hero-feature">
    <div class="hero-feature-img">
      <img src="{{ include.image | relative_url }}" alt="Featured article image">
    </div>
    <div class="hero-feature-content">
      <div class="blog-meta">
        <span class="blog-tag {{ include.tag | downcase }}">{{ include.tag }}</span>
        <span class="blog-date">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; opacity: 0.7;">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          {{ include.date }}
        </span>
      </div>
      <h2>{{ include.title }}</h2>
      <p>{{ include.desc }}</p>
      <a href="{{ include.url | relative_url }}" class="read-article-btn">
        Read Article 
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
  </div>
</section>
