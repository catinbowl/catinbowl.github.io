<header>
  <div class="container nav-wrapper">
    <a class="logo{% if page.url == '/' %} active{% endif %}" href="{{ "/" | relative_url }}">
      <img src="{{ "/assets/images/logo.png" | relative_url }}" alt="CatInBowl Logo">
      CatInBowl
    </a>
    <nav>
      <a href="/projects"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a>
      <a href="/blog"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a>
    </nav>
    <a href="/hire-me" class="hire-me-btn">
      Hire Me
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3.33331 8H12.6666M12.6666 8L8.66665 4M12.6666 8L8.66665 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</header>
